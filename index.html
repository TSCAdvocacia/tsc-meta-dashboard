<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta de Julho · TSC Advocacia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --base: #2c3740;
            --ink: #1a2126;
            --petrol: #2a4759;
            --steel: #49798c;
            --sky: #8fadbf;
            --mist: #babcbf;
            --muted: #6c7d8c;
            --faint: #586673;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            background: var(--base);
            color: var(--mist);
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient moving glows */
        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.5;
        }
        .glow.g1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, rgba(73,121,140,0.55), transparent 70%);
            top: -180px; left: -120px;
            animation: drift1 18s ease-in-out infinite;
        }
        .glow.g2 {
            width: 460px; height: 460px;
            background: radial-gradient(circle, rgba(42,71,89,0.7), transparent 70%);
            bottom: -160px; right: -100px;
            animation: drift2 22s ease-in-out infinite;
        }
        .glow.g3 {
            width: 360px; height: 360px;
            background: radial-gradient(circle, rgba(143,173,191,0.18), transparent 70%);
            top: 40%; left: 55%;
            animation: drift3 26s ease-in-out infinite;
        }
        @keyframes drift1 {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(60px,80px) scale(1.12); }
        }
        @keyframes drift2 {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-70px,-50px) scale(1.1); }
        }
        @keyframes drift3 {
            0%,100% { transform: translate(0,0) scale(1); opacity: 0.18; }
            50% { transform: translate(-50px,40px) scale(1.2); opacity: 0.3; }
        }

        /* Subtle grain/vignette */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 760px;
        }

        /* Staggered entrance */
        .reveal {
            opacity: 0;
            transform: translateY(18px);
            animation: rise 0.9s cubic-bezier(.2,.7,.2,1) forwards;
        }
        .d1 { animation-delay: 0.05s; }
        .d2 { animation-delay: 0.18s; }
        .d3 { animation-delay: 0.32s; }
        .d4 { animation-delay: 0.46s; }
        .d5 { animation-delay: 0.60s; }
        .d6 { animation-delay: 0.74s; }
        @keyframes rise {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header { text-align: center; margin-bottom: 16px; }

        .header .logo {
            width: clamp(104px, 18vw, 140px);
            height: auto;
            display: block;
            margin: 0 auto 18px;
            opacity: 0.9;
        }
        .header .eyebrow {
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            font-size: clamp(11px, 1.8vw, 14px);
            color: var(--sky);
            letter-spacing: 0.34em;
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-left: 0.34em;
        }
        .header h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: clamp(26px, 5.2vw, 46px);
            color: #fff;
            letter-spacing: 0.02em;
            line-height: 1;
        }

        /* Countdown */
        .countdown {
            display: flex;
            justify-content: center;
            gap: clamp(8px, 2vw, 16px);
            margin: 14px 0 18px;
        }
        .cd-card {
            background: linear-gradient(160deg, rgba(73,121,140,0.16), rgba(26,33,38,0.5));
            border: 1px solid rgba(143,173,191,0.16);
            border-radius: 14px;
            padding: clamp(9px,1.8vw,13px) clamp(10px,2.6vw,20px);
            min-width: clamp(64px, 14vw, 96px);
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .cd-num {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: clamp(24px, 5vw, 42px);
            color: #fff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            display: block;
        }
        .cd-card.secs .cd-num { color: var(--sky); }
        .cd-lab {
            font-size: clamp(8px, 1.3vw, 11px);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            margin-top: 8px;
            display: block;
        }

        /* Hero ring */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 8px;
        }
        .ring-wrap {
            position: relative;
            width: clamp(172px, 38vw, 224px);
            aspect-ratio: 1;
        }
        .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .ring-track { fill: none; stroke: rgba(26,33,38,0.85); stroke-width: 13; }
        .ring-prog {
            fill: none;
            stroke-width: 13;
            stroke-linecap: round;
            stroke: url(#ringGrad);
            stroke-dasharray: 691.15;
            stroke-dashoffset: 691.15;
            transition: stroke-dashoffset 1.8s cubic-bezier(.25,.8,.25,1);
            filter: drop-shadow(0 0 8px rgba(143,173,191,0.45));
        }
        .ring-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .ring-pct {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: clamp(38px, 9.5vw, 60px);
            color: #fff;
            line-height: 0.9;
            font-variant-numeric: tabular-nums;
        }
        .ring-pct small { font-size: 0.42em; font-weight: 700; color: var(--sky); vertical-align: super; margin-left: 2px; }
        .ring-sub {
            margin-top: 10px;
            font-size: clamp(11px, 1.8vw, 13px);
            color: var(--muted);
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        /* Value strip */
        .strip {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 0;
            margin: 4px 0 12px;
            background: linear-gradient(160deg, rgba(73,121,140,0.12), rgba(26,33,38,0.4));
            border: 1px solid rgba(143,173,191,0.14);
            border-radius: 16px;
            overflow: hidden;
        }
        .strip-cell {
            flex: 1;
            text-align: center;
            padding: 14px 12px;
        }
        .strip-cell + .strip-cell { border-left: 1px solid rgba(143,173,191,0.12); }
        .strip-lab {
            font-size: clamp(9px, 1.4vw, 11px);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 8px;
        }
        .strip-val {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: clamp(17px, 3.4vw, 28px);
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .strip-cell.accent .strip-val { color: var(--sky); }
        .strip-cell.goal .strip-val { color: var(--mist); }

        /* Callout */
        .callout {
            text-align: center;
            font-size: clamp(13px, 2vw, 16px);
            font-weight: 300;
            color: var(--mist);
            letter-spacing: 0.04em;
            line-height: 1.6;
            padding: 13px 22px;
            border-radius: 12px;
            border: 1px solid rgba(143,173,191,0.18);
            background: rgba(26,33,38,0.32);
            margin-bottom: 10px;
        }
        .callout strong {
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            white-space: nowrap;
        }

        /* Actions */
        .actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            background: transparent;
            border: 1px solid rgba(143,173,191,0.3);
            color: var(--sky);
            padding: 11px 24px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Lato', sans-serif;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.22s;
        }
        .btn:hover {
            border-color: var(--sky);
            color: #fff;
            background: rgba(73,121,140,0.16);
            transform: translateY(-1px);
        }
        .btn.primary {
            background: linear-gradient(135deg, var(--steel), var(--petrol));
            border-color: transparent;
            color: #fff;
        }
        .btn.primary:hover {
            background: linear-gradient(135deg, var(--sky), var(--steel));
        }

        /* Meta atingida */
        .win {
            display: none;
            text-align: center;
            margin-top: 18px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: clamp(15px, 2.4vw, 20px);
            color: var(--sky);
            letter-spacing: 0.04em;
        }
        .win.on { display: block; animation: rise 0.7s ease forwards; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(90px);
            background: linear-gradient(135deg, var(--steel), var(--petrol));
            color: #fff;
            padding: 13px 30px;
            border-radius: 10px;
            font-size: 13px;
            letter-spacing: 0.04em;
            z-index: 50;
            transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
            pointer-events: none;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 440px) {
            .countdown { gap: 7px; }
            .cd-card { padding: 11px 9px; min-width: 0; flex: 1; }
        }
    </style>
</head>

            <h1>Meta de Julho</h1>
        </div>

        <div class="countdown reveal d2" id="countdown">
            <div class="cd-card">
                <span class="cd-num" id="cd-days">--</span>
                <span class="cd-lab">dias</span>
            </div>
            <div class="cd-card">
                <span class="cd-num" id="cd-hours">--</span>
                <span class="cd-lab">horas</span>
            </div>
            <div class="cd-card">
                <span class="cd-num" id="cd-mins">--</span>
                <span class="cd-lab">min</span>
            </div>
            <div class="cd-card secs">
                <span class="cd-num" id="cd-secs">--</span>
                <span class="cd-lab">seg</span>
            </div>
        </div>

        <div class="hero reveal d3">
            <div class="ring-wrap">
                <svg viewBox="0 0 240 240">
                    <defs>
                        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#2a4759"/>
                            <stop offset="55%" stop-color="#49798c"/>
                            <stop offset="100%" stop-color="#8fadbf"/>
                        </linearGradient>
                    </defs>
                    <circle class="ring-track" cx="120" cy="120" r="110"/>
                    <circle class="ring-prog" id="ring" cx="120" cy="120" r="110"/>
                </svg>
                <div class="ring-center">
                    <div class="ring-pct"><span id="ring-pct">0</span><small>%</small></div>
                    <div class="ring-sub">da meta</div>
                </div>
            </div>
        </div>

        <div class="strip reveal d4">
            <div class="strip-cell accent">
                <div class="strip-lab">Faturamento atual</div>
                <div class="strip-val" id="val-atual">R$ 0</div>
            </div>
            <div class="strip-cell">
                <div class="strip-lab">Faltam</div>
                <div class="strip-val" id="val-falta">R$ 0</div>
            </div>
            <div class="strip-cell goal">
                <div class="strip-lab">Meta</div>
                <div class="strip-val">R$ 500 mil</div>
            </div>
        </div>

        <div class="win" id="win">Meta atingida. Parabéns ao time. 🏆</div>

        <div class="callout reveal d5">
            Atualize o valor e compartilhe no <strong>Chats Geral do escritório</strong>
        </div>

        <div class="actions reveal d6">
            <button class="btn primary" onclick="atualizarValor()">Atualizar valor</button>
            <button class="btn" onclick="copiarLink()">Copiar link</button>
        </div>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        const META = 500000;
        const RING_C = 2 * Math.PI * 110; // 691.15
        // 31/07/2026 23:59:59 BRT (UTC-3) => 01/08/2026 02:59:59 UTC
        const DEADLINE = new Date('2026-08-01T02:59:59.000Z');

        function lerValor() {
            const p = new URLSearchParams(location.search);
            const v = parseInt((p.get('valor') || '').replace(/\D/g, ''));
            return isNaN(v) ? 218228 : v;
        }
        function formatBRL(n) { return 'R$ ' + Math.round(n).toLocaleString('pt-BR'); }
        function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

        function animateNumber(el, from, to, dur, fmt) {
            const start = performance.now();
            function step(now) {
                const t = Math.min((now - start) / dur, 1);
                const v = from + (to - from) * easeOut(t);
                el.textContent = fmt(v);
                if (t < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function render(valor, animate) {
            const pct = Math.min(valor / META * 100, 100);
            const falta = Math.max(META - valor, 0);
            const ring = document.getElementById('ring');

            // ring fill
            setTimeout(() => {
                ring.style.strokeDashoffset = RING_C * (1 - pct / 100);
            }, animate ? 250 : 0);

            if (animate) {
                animateNumber(document.getElementById('ring-pct'), 0, pct, 1800,
                    v => v.toFixed(0));
                animateNumber(document.getElementById('val-atual'), 0, valor, 1600, formatBRL);
                animateNumber(document.getElementById('val-falta'), META, falta, 1600, formatBRL);
            } else {
                document.getElementById('ring-pct').textContent = pct.toFixed(0);
                document.getElementById('val-atual').textContent = formatBRL(valor);
                document.getElementById('val-falta').textContent = formatBRL(falta);
            }

            document.getElementById('win').classList.toggle('on', falta === 0);
        }

        function tick() {
            const diff = DEADLINE - new Date();
            const ids = ['cd-days','cd-hours','cd-mins','cd-secs'];
            if (diff <= 0) { ids.forEach(i => document.getElementById(i).textContent = '00'); return; }
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('cd-days').textContent  = String(d).padStart(2,'0');
            document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
            document.getElementById('cd-mins').textContent  = String(m).padStart(2,'0');
            document.getElementById('cd-secs').textContent  = String(s).padStart(2,'0');
        }

        function atualizarValor() {
            const atual = lerValor();
            const entrada = prompt('Valor atual do faturamento (só números):', atual);
            if (entrada === null) return;
            const novo = parseInt(entrada.replace(/\D/g, ''));
            if (isNaN(novo) || novo < 0) return;
            const url = new URL(location.href);
            url.searchParams.set('valor', novo);
            history.pushState({}, '', url);
            render(novo, true);
            copiarLink(true);
        }

        function copiarLink(after) {
            const url = location.href;
            if (navigator.clipboard?.writeText) {
                navigator.clipboard.writeText(url)
                    .then(() => toast(after ? 'Valor atualizado — link copiado!' : 'Link copiado!'))
                    .catch(() => toast('Copie o link da barra do navegador.'));
            } else { toast('Copie o link da barra do navegador.'); }
        }

        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.remove('show'), 3200);
        }

        render(lerValor(), true);
        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
